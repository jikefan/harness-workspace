# Example repository inventory. Replace URLs with your actual repositories in a real profile.

repos:
  api:
    name: example-api
    display_name: Public API Service
    url: https://github.com/example-org/example-api
    type: python-backend
    default_base_branch: develop
    recommended_check: scripts/agent/check.sh
  web:
    name: example-web
    display_name: Web Frontend
    url: https://github.com/example-org/example-web
    type: vite-frontend
    default_base_branch: develop
    recommended_check: scripts/agent/check.sh
  admin:
    name: example-admin
    display_name: Admin Console
    url: https://github.com/example-org/example-admin
    type: react-admin-frontend
    default_base_branch: develop
    recommended_check: scripts/agent/check.sh
